<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour Details</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
<style>
.hero {
  height: 65vh;
  background-size: cover;
  background-position: center;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.75), rgba(0,0,0,.2));
}

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- HERO -->
<section id="hero" class="hero">
  <div class="overlay"></div>

  <div class="absolute bottom-8 left-6 text-white">
    <h1 id="title" class="text-3xl font-bold"></h1>
    <p id="category" class="text-sm opacity-80"></p>
  </div>
</section>

<!-- CONTENT -->
<section class="max-w-6xl mx-auto px-6 py-8 grid md:grid-cols-3 gap-6">

  <!-- LEFT -->
  <div class="md:col-span-2 space-y-6">

    <!-- DESCRIPTION -->
    <div class="bg-white p-5 rounded-xl shadow-sm">
      <h2 class="font-bold mb-2">About</h2>
      <p id="description" class="text-gray-600"></p>
    </div>

    <!-- ROUTE -->
    <div class="bg-white p-5 rounded-xl shadow-sm">
      <h2 class="font-bold mb-2">Route</h2>
      <p id="routeText" class="text-gray-600"></p>

      <iframe id="map" class="w-full h-56 mt-3 rounded-lg hidden"></iframe>
    </div>

    <!-- GALLERY -->
    <div class="bg-white p-5 rounded-xl shadow-sm">
      <h2 class="font-bold mb-3">Gallery</h2>
      <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-2"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="space-y-6">

    <!-- BOOKING -->
    <div class="bg-white p-5 rounded-xl shadow-sm sticky top-6">
      <h2 class="font-bold mb-3">Book Tour</h2>

      <input id="name" placeholder="Name" class="w-full mb-2 p-2 border rounded">
      <input id="phone" placeholder="Phone" class="w-full mb-2 p-2 border rounded">
      <input id="date" type="date" class="w-full mb-2 p-2 border rounded">

      <button onclick="bookNow()" class="w-full bg-black text-white py-2 rounded">
        Send Booking
      </button>
    </div>

    <!-- CONTACT -->
    <div class="bg-white p-5 rounded-xl shadow-sm">
      <h2 class="font-bold mb-2">Contact</h2>

      <a id="whatsapp" class="block bg-green-500 text-white text-center py-2 rounded mb-2">
        WhatsApp
      </a>

      <a href="tel:+94700000000" class="block bg-blue-500 text-white text-center py-2 rounded">
        Call
      </a>
    </div>

  </div>

</section>

<!-- SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC_2vLQDidqZ1VHFr77TnNgktRgWbkMKBY",
  authDomain: "voyo-lanka.firebaseapp.com",
  projectId: "voyo-lanka"
});

const db = getFirestore(app);

const slug = new URLSearchParams(location.search).get("slug");

function mapUrl(from, to) {
  if (!from || !to) return "";
  return `https://www.google.com/maps?q=${encodeURIComponent(from)}+to+${encodeURIComponent(to)}&output=embed`;
}

async function loadTour() {

  const snap = await getDocs(collection(db, "tour"));

  snap.forEach(doc => {
    const t = doc.data();
    if (t.slug !== slug) return;

    document.getElementById("hero").style.backgroundImage = `url(${t.image})`;
    document.getElementById("title").innerText = t.title || "";
    document.getElementById("category").innerText = t.category || "";
    document.getElementById("description").innerText = t.description || "";

    // route
    if (t.tourType === "route") {
      document.getElementById("routeText").innerText =
        `${t.routeFrom} → ${t.routeTo}`;

      const map = document.getElementById("map");
      map.src = mapUrl(t.routeFrom, t.routeTo);
      map.classList.remove("hidden");
    } else {
      document.getElementById("routeText").innerText =
        t.area || "Sri Lanka Tour";
    }

    // gallery (simple + clean)
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    const images = t.gallery || [t.image];

    images.forEach(img => {
      const el = document.createElement("img");
      el.src = img;
      el.className = "rounded-lg h-28 w-full object-cover";
      gallery.appendChild(el);
    });

    // whatsapp
    document.getElementById("whatsapp").href =
      `https://wa.me/94700000000?text=${encodeURIComponent("I want to book " + t.title)}`;
  });
}

loadTour();

window.bookNow = () => {
  alert("Booking sent (connect Firebase later)");
};
</script>

</body>
</html>
